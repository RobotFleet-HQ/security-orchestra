<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Orchestra — Payment Cancelled</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

nav {
  background: #111;
  border-bottom: 1px solid #222;
  padding: 0 24px;
  height: 54px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 15px;
  color: #e0e0e0;
  text-decoration: none;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #00ff88;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.page {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}

.card {
  background: #141414;
  border: 1px solid #222;
  border-radius: 16px;
  padding: 48px 40px;
  max-width: 480px;
  width: 100%;
  text-align: center;
}

.icon { font-size: 52px; color: #888; margin-bottom: 20px; }
h1 { font-size: 24px; font-weight: 800; margin-bottom: 16px; }
p { color: #888; line-height: 1.6; margin-bottom: 12px; font-size: 14px; }

.btn-row { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }

.signup-btn {
  display: inline-block;
  background: #00ff88;
  color: #000;
  padding: 12px 28px;
  border-radius: 8px;
  font-weight: 800;
  font-size: 14px;
  text-decoration: none;
  transition: background .15s;
}
.signup-btn:hover { background: #00e67a; }

.home-btn {
  display: inline-block;
  background: transparent;
  border: 1px solid #333;
  color: #e0e0e0;
  padding: 12px 28px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  text-decoration: none;
  transition: border-color .15s, background .15s;
}
.home-btn:hover { border-color: #555; background: #1a1a1a; }
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <div class="dot"></div>
    Security Orchestra
  </a>
</nav>

<div class="page">
  <div class="card">
    <div class="icon">&#10005;</div>
    <h1>Payment Cancelled</h1>
    <p>No charge was made. You can try again whenever you're ready.</p>
    <div class="btn-row">
      <a href="/signup" class="signup-btn">Try Again</a>
      <a href="/" class="home-btn">Return Home</a>
    </div>
  </div>
</div>
</body>
</html>
