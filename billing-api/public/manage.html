<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Account — Security Orchestra</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

nav {
  background: #111;
  border-bottom: 1px solid #222;
  padding: 0 24px;
  height: 54px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 15px;
  color: #e0e0e0;
  text-decoration: none;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #00ff88;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.page {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 24px;
}

.page-header {
  text-align: center;
  margin-bottom: 32px;
}
.page-header h1 { font-size: 22px; font-weight: 800; color: #00ff88; }
.page-header p  { color: #888; margin-top: 6px; font-size: 14px; }

.card {
  background: #141414;
  border: 1px solid #222;
  border-radius: 16px;
  padding: 32px;
  width: 100%;
  max-width: 480px;
  margin-bottom: 16px;
}

label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 6px;
}

input[type="email"] {
  width: 100%;
  background: #1e1e1e;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  color: #e0e0e0;
  font-size: 14px;
  font-family: system-ui, sans-serif;
  padding: 11px 13px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  margin-bottom: 16px;
}
input[type="email"]:focus {
  border-color: #00ff88;
  box-shadow: 0 0 0 3px rgba(0,255,136,.08);
}
input[type="email"]::placeholder { color: #555; }

.btn {
  display: block;
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 700;
  font-family: system-ui, sans-serif;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  transition: background .15s, opacity .15s;
}
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .35; cursor: not-allowed; }

.btn-primary  { background: #00ff88; color: #000; }
.btn-primary:hover { background: #00e67a; opacity: 1; }
.btn-secondary {
  background: #1e1e1e;
  color: #e0e0e0;
  border: 1px solid #333;
  margin-top: 10px;
}
.btn-secondary:hover { background: #252525; opacity: 1; }

.account-info { display: none; }
.account-info h2 { font-size: 15px; font-weight: 800; color: #00ff88; margin-bottom: 20px; }

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #1e1e1e;
  font-size: 14px;
}
.info-row:last-of-type { border-bottom: none; }
.info-label { color: #888; }
.info-value { font-weight: 700; color: #e0e0e0; }

.tier-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.tier-free       { background: #222; color: #888; }
.tier-starter    { background: rgba(0,150,255,.15); color: #4db3ff; border: 1px solid #4db3ff; }
.tier-pro        { background: rgba(0,255,136,.12); color: #00ff88; border: 1px solid #00ff88; }
.tier-enterprise { background: rgba(255,165,0,.15); color: #ffaa40; border: 1px solid #ffaa40; }

.actions { margin-top: 20px; }

.message {
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-top: 12px;
  display: none;
  line-height: 1.5;
}
.message.success { background: #0a1f12; border: 1px solid #00ff88; color: #00ff88; }
.message.error   { background: #1f0a0a; border: 1px solid #ff4444; color: #ff6666; }

.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(0,0,0,.3);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
.btn-secondary .spinner { border: 2px solid rgba(255,255,255,.2); border-top-color: #e0e0e0; }
@keyframes spin { to { transform: rotate(360deg); } }

.divider { border: none; border-top: 1px solid #1e1e1e; margin: 20px 0; }

footer { margin-top: 16px; color: #444; font-size: 13px; text-align: center; }
footer a { color: #444; text-decoration: none; }
footer a:hover { color: #00ff88; }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <div class="dot"></div>
    Security Orchestra
  </a>
</nav>

<div class="page">

  <div class="page-header">
    <h1>Security Orchestra</h1>
    <p>Manage your account</p>
  </div>

  <!-- Lookup form -->
  <div class="card" id="lookup-card">
    <label for="email-input">Your account email</label>
    <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
    <button class="btn btn-primary" id="lookup-btn" onclick="lookupAccount()">Look Up Account</button>
    <div class="message" id="lookup-msg"></div>
  </div>

  <!-- Account info (shown after lookup) -->
  <div class="card account-info" id="account-card">
    <h2>Account Details</h2>

    <div class="info-row">
      <span class="info-label">Email</span>
      <span class="info-value" id="disp-email">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Plan</span>
      <span class="info-value"><span class="tier-badge" id="disp-tier">—</span></span>
    </div>
    <div class="info-row">
      <span class="info-label">Credit Balance</span>
      <span class="info-value" id="disp-balance">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Credits Used</span>
      <span class="info-value" id="disp-used">—</span>
    </div>

    <hr class="divider">

    <div class="actions">
      <!-- Stripe portal: only shown for paid users -->
      <button class="btn btn-primary" id="portal-btn" onclick="openPortal()" style="display:none">
        Manage Billing &amp; Subscription
      </button>

      <!-- Resend API key: available to everyone -->
      <button class="btn btn-secondary" id="resend-btn" onclick="resendKey()">
        Email Me a New API Key
      </button>

      <div class="message" id="action-msg"></div>

      <hr class="divider">

      <button class="btn btn-secondary" onclick="resetLookup()" style="margin-top:0">
        &#8592; Look Up a Different Email
      </button>
    </div>
  </div>

  <footer>
    <a href="/">&#8592; Back to Security Orchestra</a>
  </footer>

</div>

<script>
  let currentEmail = "";
  let hasStripeCustomer = false;

  function setLoading(btn, loading, defaultText) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="spinner"></span>Loading…'
      : defaultText;
  }

  function showMsg(el, type, text) {
    el.className = "message " + type;
    el.textContent = text;
    el.style.display = "block";
  }

  function hideMsg(el) {
    el.style.display = "none";
  }

  async function lookupAccount() {
    const emailInput = document.getElementById("email-input");
    const btn        = document.getElementById("lookup-btn");
    const msg        = document.getElementById("lookup-msg");
    const email      = emailInput.value.trim();

    if (!email) { showMsg(msg, "error", "Please enter your email address."); return; }

    hideMsg(msg);
    setLoading(btn, true, "Look Up Account");

    try {
      const res  = await fetch("/manage/account?email=" + encodeURIComponent(email));
      const data = await res.json();

      if (!res.ok) {
        showMsg(msg, "error", data.error || "Account not found.");
        setLoading(btn, false, "Look Up Account");
        return;
      }

      // Populate account card
      currentEmail     = email;
      hasStripeCustomer = data.has_stripe_customer;

      document.getElementById("disp-email").textContent   = email;
      document.getElementById("disp-balance").textContent = data.balance + " credits";
      document.getElementById("disp-used").textContent    = data.total_used + " credits";

      const tierEl = document.getElementById("disp-tier");
      tierEl.textContent = data.tier.charAt(0).toUpperCase() + data.tier.slice(1);
      tierEl.className   = "tier-badge tier-" + data.tier;

      document.getElementById("portal-btn").style.display = data.has_stripe_customer ? "block" : "none";

      document.getElementById("lookup-card").style.display  = "none";
      document.getElementById("account-card").style.display = "block";

    } catch (err) {
      showMsg(msg, "error", "Network error — please try again.");
      setLoading(btn, false, "Look Up Account");
    }
  }

  async function openPortal() {
    const btn = document.getElementById("portal-btn");
    const msg = document.getElementById("action-msg");

    hideMsg(msg);
    setLoading(btn, true, "Manage Billing &amp; Subscription");

    try {
      const res  = await fetch("/manage/portal", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email: currentEmail }),
      });
      const data = await res.json();

      if (!res.ok) {
        showMsg(msg, "error", data.error || "Could not open billing portal.");
        setLoading(btn, false, "Manage Billing &amp; Subscription");
        return;
      }

      window.location.href = data.url;

    } catch (err) {
      showMsg(msg, "error", "Network error — please try again.");
      setLoading(btn, false, "Manage Billing &amp; Subscription");
    }
  }

  async function resendKey() {
    const btn = document.getElementById("resend-btn");
    const msg = document.getElementById("action-msg");

    hideMsg(msg);
    setLoading(btn, true, "Email Me a New API Key");

    try {
      const res  = await fetch("/manage/resend-key", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email: currentEmail }),
      });
      const data = await res.json();

      if (!res.ok) {
        showMsg(msg, "error", data.error || "Could not send key.");
      } else {
        showMsg(msg, "success", "New API key sent! Check your inbox.");
      }
    } catch (err) {
      showMsg(msg, "error", "Network error — please try again.");
    }

    setLoading(btn, false, "Email Me a New API Key");
  }

  function resetLookup() {
    currentEmail      = "";
    hasStripeCustomer = false;
    document.getElementById("account-card").style.display = "none";
    document.getElementById("lookup-card").style.display  = "block";
    document.getElementById("email-input").value = "";
    hideMsg(document.getElementById("lookup-msg"));
    hideMsg(document.getElementById("action-msg"));
  }

  // Allow Enter key to trigger lookup
  document.getElementById("email-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") lookupAccount();
  });
</script>

</body>
</html>
