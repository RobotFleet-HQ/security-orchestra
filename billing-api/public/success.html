<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Orchestra — Payment Successful</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

nav {
  background: #111;
  border-bottom: 1px solid #222;
  padding: 0 24px;
  height: 54px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 15px;
  color: #e0e0e0;
  text-decoration: none;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #00ff88;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.page {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}

.card {
  background: #141414;
  border: 1px solid #222;
  border-radius: 16px;
  padding: 48px 40px;
  max-width: 480px;
  width: 100%;
  text-align: center;
}

.icon { font-size: 52px; color: #00ff88; margin-bottom: 20px; }
h1 { font-size: 24px; font-weight: 800; margin-bottom: 16px; }
p { color: #888; line-height: 1.6; margin-bottom: 12px; font-size: 14px; }

.home-btn {
  display: inline-block;
  margin-top: 24px;
  background: #00ff88;
  color: #000;
  padding: 12px 32px;
  border-radius: 8px;
  font-weight: 800;
  font-size: 14px;
  text-decoration: none;
  transition: background .15s;
}
.home-btn:hover { background: #00e67a; }
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <div class="dot"></div>
    Security Orchestra
  </a>
</nav>

<div class="page">
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>Payment Successful!</h1>
    <p>Check your email — your API key and setup instructions are on their way.</p>
    <p>It may take a minute or two to arrive. Check your spam folder if you don't see it.</p>
    <a href="/" class="home-btn">Return Home</a>
  </div>
</div>
</body>
</html>
